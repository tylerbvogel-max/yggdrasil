<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Yggdrasil</h1>
    <span class="subtitle">Bolster</span>
  </div>

  <div id="controls">
    <div class="row">
      <label for="model">Model</label>
      <select id="model">
        <option value="haiku" selected>Haiku</option>
        <option value="sonnet">Sonnet</option>
        <option value="opus">Opus</option>
      </select>
    </div>
    <div class="row">
      <label for="department">Department</label>
      <select id="department">
        <option value="">All</option>
        <option value="Executive Leadership">Executive Leadership</option>
        <option value="Engineering">Engineering</option>
        <option value="Contracts & Compliance">Contracts & Compliance</option>
        <option value="Manufacturing & Operations">Manufacturing & Operations</option>
        <option value="Business Development">Business Development</option>
        <option value="Administrative & Support">Administrative & Support</option>
        <option value="Finance">Finance</option>
        <option value="Program Management">Program Management</option>
      </select>
    </div>

    <div class="buttons">
      <button id="sendPage" class="btn primary">Extract & Send Page</button>
      <button id="sendSelection" class="btn secondary">Send Selection</button>
    </div>
  </div>

  <div id="status" class="hidden">
    <div class="spinner"></div>
    <span id="statusText">Sending to Yggdrasil...</span>
  </div>

  <div id="result" class="hidden">
    <div id="reasoning" class="reasoning"></div>
    <div class="counts">
      <div class="count-item">
        <span class="count-label">Scanned</span>
        <span id="scanned" class="count-value">0</span>
      </div>
      <div class="count-item">
        <span class="count-label">Updates</span>
        <span id="updates" class="count-value">0</span>
      </div>
      <div class="count-item">
        <span class="count-label">New</span>
        <span id="newNeurons" class="count-value">0</span>
      </div>
    </div>
    <a id="reviewLink" href="#" class="btn primary review-link">Review in Yggdrasil</a>
  </div>

  <div id="error" class="hidden">
    <p id="errorText"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
