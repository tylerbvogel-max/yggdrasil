# Yggdrasil — Organizational Neuron Graph
# Layer 0: Department, Layer 1: Role, Layer 2: Task Category
# Layer 3: System/Tool, Layer 4: Decision/Analysis, Layer 5: Output/Comm

departments:

  - label: Executive Leadership
    roles:
      - label: Chief Executive Officer
        role_key: ceo
        tasks:
          - label: Strategic planning and vision setting
            systems:
              - label: Review quarterly performance dashboards in ERP
                decisions:
                  - label: Prioritize program investments based on ROI and strategic alignment
                    outputs:
                      - label: Issue strategic direction memo to division heads
                        content: |
                          Draft executive memo summarizing quarterly strategic priorities. Include program investment rankings
                          by weighted ROI score, workforce allocation targets, and key milestones for next quarter. Reference
                          Boeing synergies roadmap and autonomous systems growth targets. Format as 1-page executive summary
                          with appendix of supporting financial data. Route through Chief of Staff for distribution.
              - label: Conduct board preparation using investor relations data
                decisions:
                  - label: Identify key risk areas and mitigation strategies for board presentation
                    outputs:
                      - label: Prepare board deck with risk matrix and growth projections
                        content: |
                          Assemble board presentation package including 5-year revenue projections, program risk heat map,
                          competitive landscape analysis, and talent pipeline status. Include ITAR compliance summary and
                          export control audit results. Format per Yggdrasil Aero board template with executive summary slide,
                          financial overview, program status (green/yellow/red), and strategic initiatives tracker.

          - label: Resource allocation and organizational decisions
            systems:
              - label: Analyze headcount and budget data from HR and Finance systems
                decisions:
                  - label: Approve or redirect resource requests based on program priority
                    outputs:
                      - label: Publish resource allocation directive with budget ceilings
                        content: |
                          Issue formal resource allocation directive specifying FY budget ceilings per division, approved
                          headcount additions, capital expenditure limits, and inter-program resource sharing agreements.
                          Include approval authority matrix and escalation procedures for over-ceiling requests. Reference
                          AS9100 Section 7.1 resource management requirements.

      - label: Chief Operating Officer
        role_key: coo
        tasks:
          - label: Operational efficiency and process improvement
            systems:
              - label: Monitor production KPIs in MES dashboard
                decisions:
                  - label: Identify bottlenecks and authorize process changes per AS9100 change management
                    outputs:
                      - label: Issue operations improvement directive with measurable targets
                        content: |
                          Document operational improvement initiative per AS9100 Section 10.3. Include current baseline
                          metrics, target improvements (cycle time, first-pass yield, OTD), root cause analysis of
                          identified bottlenecks, and assigned action items with owners and due dates. Reference lean
                          manufacturing principles and Six Sigma DMAIC methodology where applicable.

          - label: Cross-functional coordination and conflict resolution
            systems:
              - label: Run weekly ops review using integrated program status tracker
                decisions:
                  - label: Resolve inter-department resource conflicts and schedule deconfliction
                    outputs:
                      - label: Publish weekly ops directive with resolved action items
                        content: |
                          Compile weekly operations review minutes including program status updates (EVM data),
                          resource conflict resolutions, schedule adjustments, and risk mitigations. Format per
                          Yggdrasil Aero ops review template. Distribute to all department heads within 4 hours of review.

      - label: Chief Technology Officer
        role_key: cto
        tasks:
          - label: Technology roadmap and R&D investment
            systems:
              - label: Evaluate TRL levels of emerging technologies using lab test data
                decisions:
                  - label: Approve technology insertion into programs based on TRL and schedule risk
                    outputs:
                      - label: Publish technology roadmap update with insertion milestones
                        content: |
                          Update technology roadmap document per DO-178C and DO-254 development assurance levels.
                          Include TRL assessment for each candidate technology, risk-adjusted insertion timeline,
                          required certification artifacts, and estimated NRE costs. Cross-reference with program
                          schedules to identify insertion windows. Format as controlled document per CM procedures.

          - label: Technical standards and architecture governance
            systems:
              - label: Review system architecture proposals against reference architecture
                decisions:
                  - label: Approve or require modification of proposed technical approaches
                    outputs:
                      - label: Issue technical directive or architecture decision record
                        content: |
                          Document architecture decision per ADR template. Include context, decision drivers,
                          considered alternatives with trade study results, decision rationale, and consequences.
                          Reference applicable MIL-STD-882E safety analysis, DO-178C DAL levels, and interface
                          control documents. Route through Configuration Control Board for baseline update.

      - label: Chief Financial Officer
        role_key: cfo
        tasks:
          - label: Financial planning and budget management
            systems:
              - label: Generate financial forecasts using ERP and cost accounting systems
                decisions:
                  - label: Approve budget modifications based on variance analysis and cash flow
                    outputs:
                      - label: Issue budget guidance memo with variance thresholds
                        content: |
                          Publish quarterly budget guidance including updated revenue forecasts, cost-to-complete
                          estimates per program, indirect rate projections, and cash flow requirements. Specify
                          variance reporting thresholds (cost: 5%, schedule: 2 weeks) and escalation procedures.
                          Reference FAR 31.2 cost principles and CAS 401-420 standards for cost accounting compliance.

          - label: DCAA audit preparation and compliance
            systems:
              - label: Compile incurred cost submissions from accounting system
                decisions:
                  - label: Review and certify cost pool allocations per CAS requirements
                    outputs:
                      - label: Submit annual incurred cost proposal per DCAA requirements
                        content: |
                          Prepare incurred cost proposal per DCAA ICE model format. Include Schedule H (home office
                          expenses), direct/indirect cost pool summaries, base of application calculations, and
                          certificate of final indirect costs. Ensure compliance with FAR 52.216-7 and applicable
                          Cost Accounting Standards. Retain supporting documentation for 6-year audit trail.

      - label: VP Engineering
        role_key: vp_engineering
        tasks:
          - label: Engineering resource planning and technical oversight
            systems:
              - label: Review engineering workload in project management tools
                decisions:
                  - label: Allocate engineering teams to programs based on skill matrix and availability
                    outputs:
                      - label: Publish engineering staffing plan with skill gap analysis
                        content: |
                          Generate engineering staffing matrix showing current allocation, projected demand by program,
                          identified skill gaps, and hiring/training recommendations. Include AS9100 Section 7.2
                          competence requirements mapping. Format as quarterly rolling forecast with monthly updates.

      - label: VP Operations
        role_key: vp_operations
        tasks:
          - label: Manufacturing capacity planning
            systems:
              - label: Analyze production schedules and capacity models
                decisions:
                  - label: Approve capacity investments or outsourcing decisions
                    outputs:
                      - label: Issue capacity plan with make-buy decisions
                        content: |
                          Document manufacturing capacity plan including current utilization rates, projected demand
                          curves, identified capacity constraints, and recommended investments (equipment, tooling,
                          facilities). Include make-buy analysis per FAR 15.407-2 and AS9100 Section 8.4 external
                          provider requirements. Reference NADCAP special process certifications where applicable.

      - label: VP Business Development
        role_key: vp_bd
        tasks:
          - label: Pipeline management and capture strategy
            systems:
              - label: Review opportunity pipeline in CRM and SAM.gov feeds
                decisions:
                  - label: Gate review decisions for bid/no-bid and win strategy approval
                    outputs:
                      - label: Issue capture decision brief with competitive assessment
                        content: |
                          Prepare capture decision brief per Shipley process gate review format. Include opportunity
                          assessment (contract value, period of performance, NAICS code), competitive landscape
                          (incumbent, known competitors, PTW analysis), win strategy with discriminators, teaming
                          strategy, and resource requirements. Reference FAR Part 15 source selection criteria.

  - label: Engineering
    roles:
      - label: Mechanical Engineer
        role_key: mech_eng
        tasks:
          - label: Structural analysis and design
            systems:
              - label: Run FEA simulations in ANSYS/NASTRAN for load cases per MIL-STD-1530
                decisions:
                  - label: Evaluate stress margins and identify design modifications needed
                    outputs:
                      - label: Generate stress analysis report per company template
                        content: |
                          Prepare structural analysis report including load case definitions per MIL-STD-1530 Aircraft
                          Structural Integrity Program. Document FEA model description, mesh convergence study,
                          material properties (per MMPDS/CMH-17), applied loads and boundary conditions, stress/strain
                          results with margin of safety calculations (MS = (Allowable/Applied) - 1). Include fatigue
                          and damage tolerance analysis per AC 25.571-1D. Format per Yggdrasil Aero stress report template
                          with independent check signature block.
              - label: Create 3D models and drawings in CATIA/NX per AS9100 design control
                decisions:
                  - label: Validate GD&T per ASME Y14.5 and manufacturing feasibility
                    outputs:
                      - label: Release drawings through PLM with configuration control
                        content: |
                          Release engineering drawings per AS9100 Section 8.3.4 design and development controls.
                          Ensure GD&T compliance with ASME Y14.5-2018, material callouts per AMS/ASTM specs,
                          surface finish requirements, and special process notes (heat treat, NDT). Process through
                          PLM workflow: designer → checker → stress → DER (if applicable) → release. Assign
                          configuration item numbers per CM plan.

          - label: Thermal and environmental analysis
            systems:
              - label: Model thermal profiles using CFD tools for operating envelope
                decisions:
                  - label: Assess thermal margins against component limits and qualify design
                    outputs:
                      - label: Issue thermal analysis report with qualification test recommendations
                        content: |
                          Document thermal analysis per MIL-STD-810H environmental engineering considerations.
                          Include thermal model description, boundary conditions (ambient temp range, solar loading,
                          internal heat sources), steady-state and transient results, and component temperature
                          margins. Recommend qualification test profiles per MIL-STD-810H Method 501.7 (high temp)
                          and Method 502.7 (low temp). Cross-reference with DO-160G Section 4 for avionics.

      - label: Electrical Engineer
        role_key: elec_eng
        tasks:
          - label: Power system design and analysis
            systems:
              - label: Design power distribution using MIL-STD-704F power quality requirements
                decisions:
                  - label: Select power architecture and verify voltage/current margins
                    outputs:
                      - label: Release power system schematic with load analysis
                        content: |
                          Prepare electrical power system design package including single-line diagram, load analysis
                          (normal, emergency, ground ops), wire sizing per AS50881, circuit protection coordination
                          study, and EMI/EMC analysis plan per MIL-STD-461G. Document power quality compliance per
                          MIL-STD-704F (28 VDC or 115 VAC 400Hz). Include derating analysis per NAVSEA TE000-AB-GTP-010.

          - label: Avionics integration and testing
            systems:
              - label: Configure avionics test bench per DO-160G environmental categories
                decisions:
                  - label: Validate interface compatibility and signal integrity
                    outputs:
                      - label: Generate avionics integration test report
                        content: |
                          Document avionics integration test results per DO-160G environmental conditions and
                          categories. Include ARINC 429/MIL-STD-1553B bus interface verification, discrete I/O
                          validation, analog signal characterization, and power transient testing. Reference
                          applicable ICD version and trace requirements to system spec. Format per RTCA/DO-178C
                          verification evidence standards.

      - label: Software Engineer
        role_key: sw_eng
        tasks:
          - label: Flight software development
            systems:
              - label: Develop in Ada/C++ per DO-178C DAL A/B coding standards
                decisions:
                  - label: Review code against MISRA-C rules and DO-178C objectives
                    outputs:
                      - label: Submit code review package with traceability matrix
                        content: |
                          Prepare software code review package per DO-178C Section 6.3. Include source code listing
                          with MISRA-C:2012 compliance report, code-to-requirements traceability matrix, structural
                          coverage analysis (MC/DC for DAL A, decision for DAL B), and review checklist. Document
                          any deviations with rationale per DO-178C Table A-5. Submit through software CCB.

          - label: GCS and mission software
            systems:
              - label: Implement ground control station features per UCS architecture
                decisions:
                  - label: Validate operator workflow and human factors per MIL-STD-1472
                    outputs:
                      - label: Release GCS software build with operator acceptance test results
                        content: |
                          Package GCS software release including build manifest, operator acceptance test report
                          per MIL-STD-1472H human factors criteria, STANAG 4586 interoperability verification,
                          and cybersecurity scan results per RMF/NIST 800-53. Include release notes with known
                          issues and workarounds. Deploy per software configuration management plan.

      - label: Systems Engineer
        role_key: sys_eng
        tasks:
          - label: Requirements management and decomposition
            systems:
              - label: Manage requirements in DOORS with bidirectional traceability
                decisions:
                  - label: Validate requirement completeness per INCOSE verification methods
                    outputs:
                      - label: Publish requirements specification with verification cross-reference
                        content: |
                          Generate system requirements specification per IEEE 1220 / ISO/IEC 15288. Include
                          requirement statements with unique IDs, rationale, parent trace, verification method
                          (analysis/demonstration/test/inspection), and allocated subsystem. Maintain bidirectional
                          traceability in DOORS: ConOps → system req → subsystem req → design element → test case.
                          Conduct requirements review per AS9100 Section 8.2.3.

          - label: Interface control and system integration
            systems:
              - label: Maintain ICDs in document management system per CM procedures
                decisions:
                  - label: Resolve interface conflicts through technical interchange meetings
                    outputs:
                      - label: Release updated ICD through configuration control board
                        content: |
                          Update Interface Control Document per MIL-STD-3100. Include physical interfaces (connectors,
                          mounting, envelope), electrical interfaces (signals, power, grounding), data interfaces
                          (protocols, message formats, timing), and environmental interfaces (thermal, vibration).
                          Process change through CCB with impact assessment. Distribute to all affected subsystem leads.

      - label: Manufacturing Engineer
        role_key: mfg_eng
        tasks:
          # ── L2: Manufacturing Strategy & Planning ──
          - label: Manufacturing Strategy & Planning
            summary: >-
              Strategic planning for manufacturing systems — aligning manufacturing capability
              with business objectives, technology roadmaps, and capacity planning
            systems:
              - label: Manufacturing Strategy Formulation
                content: |
                  Defining manufacturing mission and objectives; aligning mfg strategy with business
                  strategy; functionality of manufacturing systems (cost, quality, flexibility, delivery);
                  generic strategies and their impact on mfg structure.
              - label: Planning Process & Methodology
                content: |
                  Defining the planning process; principles of planning; factors affecting planning needs;
                  schools of thought (formal vs. incremental); alternative end states; paradoxes, pitfalls,
                  and implementation difficulties.
              - label: Manufacturing Systems Evolution
                content: |
                  Evolution from job shop to batch to mass to flexible manufacturing; system functionality
                  tradeoffs; mapping current-state to future-state capability; qualitative decision analysis
                  for system architecture choices.
              - label: Operational & Capacity Planning
                content: |
                  Operational planning for manufacturing systems; rough-cut capacity estimation; linking
                  strategic plans to tactical execution; planning time horizons.

          # ── L2: Manufacturing Investment Analysis ──
          - label: Manufacturing Investment Analysis
            summary: >-
              Economic evaluation, simulation modeling, and financial justification of
              manufacturing systems, equipment, and automation investments
            systems:
              - label: Dynamic Modeling of Manufacturing Systems
                content: |
                  Rough-cut estimation of system performance; high-resolution simulation (discrete event,
                  Monte Carlo); modeling throughput, utilization, WIP, and bottlenecks for proposed
                  manufacturing configurations.
              - label: Economic Translation & Financial Analysis
                content: |
                  Selection of benchmark alternatives; incremental comparison of alternatives; cash flow
                  analysis; NPV, IRR, payback period; composite cost of capital; translating operational
                  improvements to financial metrics.
              - label: Decision Analysis Under Uncertainty
                content: |
                  Monte Carlo techniques for capturing deviation; game theory for risk; expected value
                  calculations; decision trees for sequential investment decisions; sensitivity analysis
                  for key assumptions.
              - label: Capital Investment Justification
                content: |
                  Building the business case for manufacturing investments; justifying automation and CIM;
                  quantifying intangible benefits (flexibility, quality, lead time); presenting to management
                  with risk-adjusted projections.

          # ── L2: Cost Estimating & Control ──
          - label: Cost Estimating & Control
            summary: >-
              Manufacturing cost structures, estimating methods, learning curves, budgeting
              for manufacturing operations, and cost forecasting
            systems:
              - label: Cost Structure & Recovery
                content: |
                  Types of costs (direct, indirect, fixed, variable); cost centers; components of
                  labor/overhead rates; understanding cost allocation to manufactured products.
              - label: Manufacturing Budgeting
                content: |
                  Direct labor determination; expense and hourly rate determination; indirect manufacturing
                  costs; budgeting for indirect labor cost centers; budgeting on automated workcenters
                  (machine-hour vs. labor-hour).
              - label: Cost Estimating Process
                content: |
                  Required input data for estimates; estimating material costs; estimating labor costs;
                  the cost estimate grid; types of costing systems (job order, process, standard,
                  activity-based); cost review process.
              - label: Learning Curves
                content: |
                  Curve parameters and types (Crawford unit, Wright cumulative average); curve construction
                  procedure; integrating learning curves into cost estimates; realization factors; assumptions
                  and effects of forgetting.
              - label: Computer-Assisted Estimating & Forecasting
                content: |
                  Parametric cost models; feature-based estimating; computer-assisted cost estimating tools;
                  cost forecasting methods; variance analysis and estimate-at-completion tracking.

          # ── L2: Manufacturing Control Systems ──
          - label: Manufacturing Control Systems
            summary: >-
              Conceptual framework for manufacturing management control — MRP, JIT, TQM,
              and CIM as integrated control paradigms
            systems:
              - label: Manufacturing Control Process
                content: |
                  Organizational control process; the manufacturing control process
                  (plan-execute-measure-correct); manufacturing management accounting as control feedback;
                  levels of manufacturing control (strategic, tactical, operational).
              - label: Manufacturing Resource Planning (MRP/MRPII)
                content: |
                  Evolution from MRP to MRPII; closed-loop MRP; bill of materials management; capacity
                  requirements planning; MRP system architecture and integration points.
              - label: Integrated Control Paradigms
                content: |
                  JIT as a control philosophy (pull vs. push); Total Quality as a control system; CIM
                  as information integration; how these paradigms interact and complement each other
                  in a manufacturing enterprise.
              - label: Emerging Manufacturing Control Technologies
                content: |
                  Issues facing manufacturing enterprises; evolving control technologies; transition from
                  islands of automation to integrated systems; role of real-time data in manufacturing
                  control; evolution toward smart manufacturing.

          # ── L2: Management of Manufacturing Technology ──
          - label: Management of Manufacturing Technology
            summary: >-
              Technology lifecycle management — identifying, evaluating, selecting, and
              deploying manufacturing technologies
            systems:
              - label: Technology Management Lifecycle
                content: |
                  Technology management lifecycle stages; technology selection model; management action
                  model; linking technology decisions to manufacturing strategy.
              - label: Technology Planning & Assessment
                content: |
                  Opportunity identification (technology scanning/scouting); opportunity assessment (TRL,
                  manufacturing readiness); management planning tools for technology portfolios.
              - label: Technology Selection & Specification
                content: |
                  System definition; technology review and benchmarking; system specification development;
                  system verification methods; make/buy decision framework for manufacturing technology.
              - label: Technology Implementation & Deployment
                content: |
                  Preliminary and detailed design of technology deployment; implementation planning;
                  acceptance testing criteria; production support and sustainment; managing the technology
                  transition to production.

          # ── L2: Design for Manufacture ──
          - label: Design for Manufacture
            summary: >-
              DFM methodologies, process-driven design, robust design, and quantitative
              evaluation methods for manufacturing-conscious product design
            systems:
              - label: DFM Fundamentals & Design Process
                content: |
                  The design process from manufacturing perspective; governing characteristics (function,
                  form, material, process); organizational and procedural issues; concurrent engineering
                  approach.
              - label: DFM Process & Imperatives
                content: |
                  A structured DFM process; imperatives for effective DFM (minimize part count,
                  standardize, design for ease of fabrication); implementing the DFM imperatives;
                  cross-functional design review.
              - label: DFM Guidelines & Quantitative Methods
                content: |
                  DFM guidelines by process type; applying guidelines systematically; quantitative
                  evaluation methods (Boothroyd-Dewhurst DFA analysis, assembly efficiency scores,
                  manufacturability ratings).
              - label: Robust Design (Taguchi Methods)
                content: |
                  Parameter design; tolerance design; signal-to-noise ratios; orthogonal arrays;
                  reducing manufacturing variation through design; quality loss function.
              - label: Computer-Aided & Process-Driven DFM
                content: |
                  Tools for process-driven design; computer-aided DFM software; traditional design
                  methodologies (DFMA, value engineering, group technology); comparison of DFM
                  methodologies and when to apply each.

          # ── L2: Manufacturing Standards & Certification ──
          - label: Manufacturing Standards & Certification
            summary: >-
              Standards development, international certification systems, and company
              standards programs relevant to manufacturing engineering
            systems:
              - label: Standards Development & Framework
                content: |
                  Historical background of manufacturing standards; development process for standards
                  (ANSI, ISO, ASTM, SAE); how standards are created, maintained, and revised; role of
                  the manufacturing engineer in standards bodies.
              - label: International Standards & Certification Systems
                content: |
                  ISO 9000 series; AS9100 (aerospace); IATF 16949 (automotive); international
                  certification bodies; Nadcap special process accreditation; CE marking and global
                  compliance.
              - label: Company Standards Programs
                content: |
                  Establishing internal manufacturing standards; process specifications; material
                  specifications; workmanship standards; maintaining company standards library;
                  certification of manufacturing processes and personnel.

          # ── L2: Just-in-Time Manufacturing ──
          - label: Just-in-Time Manufacturing
            summary: >-
              JIT philosophy, implementation modules, pull systems, setup reduction, and
              continuous improvement for manufacturing flow
            systems:
              - label: JIT Philosophy & Themes
                content: |
                  Core JIT themes (waste elimination, continuous improvement, respect for people);
                  planning and assessment for JIT readiness; organizational prerequisites; awareness
                  and education; housekeeping (5S).
              - label: JIT Process Flow & Setup Reduction
                content: |
                  Process flow optimization; cellular manufacturing; setup and changeover reduction
                  (SMED); uniform plant loading; leveled production scheduling; reducing batch sizes
                  toward single-piece flow.
              - label: Pull Systems & Kanban
                content: |
                  The pull system concept; kanban design and sizing; signal types (card, container,
                  electronic); supplier network integration for JIT delivery; transitioning from
                  push to pull.
              - label: JIT Implementation & Continuous Improvement
                content: |
                  Diagnostic review; conceptual design activities; implementation planning and phasing;
                  kaizen methodology; sustaining JIT gains; quality improvement as integral to JIT.

          # ── L2: Computer-Integrated Manufacturing ──
          - label: Computer-Integrated Manufacturing
            summary: >-
              CIM architecture, enabling technologies, integration strategies, and
              planning/justification for manufacturing automation
            systems:
              - label: CIM Architecture & Definition
                content: |
                  Definition of CIM; driving forces (competition, quality, flexibility); CIM reference
                  models; relationship between CAD, CAM, CAPP, and MES/ERP systems; the product data
                  lifecycle.
              - label: CIM Technologies — Product & Process
                content: |
                  Beginning the product cycle (CAD/CAE); manufacturing the product (CNC, robotics, FMS,
                  AGVs); planning and controlling the manufacturing process (CAPP, MRP, shop floor
                  control).
              - label: Integration & Communication Protocols
                content: |
                  Connecting islands of automation; MAP (Manufacturing Automation Protocol) and TOP
                  (Technical Office Protocol); data exchange standards (IGES, STEP); network architecture
                  for manufacturing.
              - label: CIM Planning & Justification
                content: |
                  Strategic planning for CIM implementation; phased approach to CIM; justifying CIM
                  investments (tangible and intangible benefits); organizational change management for
                  CIM deployment.

          # ── L2: Facilities Planning & Plant Layout ──
          - label: Facilities Planning & Plant Layout
            summary: >-
              Site selection, plant layout optimization, energy management, environmental
              compliance, and disaster preparedness for manufacturing facilities
            systems:
              - label: Plant Layout Fundamentals
                content: |
                  Economic impact of layout decisions; facility arrangement types (process, product,
                  fixed-position, cellular); layout fundamentals (flow patterns, space requirements,
                  aisle design); systematic layout planning (SLP).
              - label: Computerized Facilities Planning
                content: |
                  Computer-aided layout tools (CRAFT, ALDEP, CORELAP); simulation-based layout
                  evaluation; material flow analysis; integration with process planning.
              - label: Energy Management for Manufacturing
                content: |
                  Energy audits for manufacturing operations; energy conservation in manufacturing
                  processes; cogeneration opportunities; energy-efficient equipment selection; utility
                  cost impact on manufacturing costs.
              - label: Environmental Compliance & Pollution Control
                content: |
                  Pollution abatement in manufacturing processes; environmental protection regulations
                  affecting manufacturing; waste minimization at source; emissions control; environmental
                  impact of manufacturing process selection.

          # ── L2: Equipment Planning & Maintenance ──
          - label: Equipment Planning & Maintenance
            summary: >-
              Equipment selection, material handling systems, installation, integration,
              and maintenance strategies for manufacturing equipment
            systems:
              - label: Equipment Selection & Criteria
                content: |
                  Criteria development for equipment selection; the selection process (evaluation matrix,
                  vendor assessment, runoff testing); equipment profile evolution; Manufacturing Automation
                  Protocol (MAP) compliance.
              - label: Group Technology & Equipment Strategy
                content: |
                  Group technology as a manufacturing strategy; part family formation; machine cell design;
                  aligning equipment capability with product family requirements; flexible manufacturing
                  systems.
              - label: Material Handling Systems
                content: |
                  Material handling segmentation; flow development; performance evaluation; integration of
                  subsystems (conveyors, AGVs, AS/RS, robots); material handling equipment selection
                  criteria.
              - label: Systems Integration & Installation
                content: |
                  Integrating equipment into manufacturing cells/lines; equipment installation planning;
                  utility requirements; commissioning and qualification; IQ/OQ/PQ protocols.
              - label: Maintenance Strategy & Implementation
                content: |
                  Maintenance principles (reactive, preventive, predictive, TPM); maintenance program
                  development and implementation; MTBF/MTTR analysis; spare parts management; maintenance
                  integration with production scheduling.

          # ── L2: Production Planning & Control ──
          # ★ Reparented: existing neuron 97 chain lives here as L3
          - label: Production Planning & Control
            summary: >-
              Forecasting, master scheduling, MRP execution, capacity planning, and shop
              floor control from the manufacturing engineering perspective
            systems:
              - label: Demand Forecasting for Manufacturing
                content: |
                  Forecasting theory and methods; seasonality adjustment; statistical forecasting;
                  demand/orders management; spares and service parts forecasting; linking forecast
                  accuracy to manufacturing planning.
              - label: Aggregate Planning & Master Scheduling
                content: |
                  Sales plan to production plan translation; inventory planning; authorization of master
                  schedule; rough-cut capacity planning; planning time fences; pull method differences
                  from traditional master scheduling.
              - label: Requirements & Capacity Planning
                content: |
                  Detail production planning; machine loading; bottleneck recognition (theory of
                  constraints); capacity alternatives (overtime, subcontract, investment); purchased
                  parts planning; MRP vs. JIT execution.
              - label: Scheduling & Production Activity Control
                content: |
                  Priority rules and dispatching; work flow patterns (job shop, flow shop, project);
                  simulation for schedule optimization; shop floor control; production reporting and
                  feedback.
              - label: Process Planning & Work Instruction Development
                summary: >-
                  Reparented from direct role child. Process planning for manufacturing operations
                  including work instructions and AS9100 compliance.
                decisions:
                  - label: Create manufacturing plans in MES and validate process capability per AS9100 Section 8.5
                    outputs:
                      - label: Release manufacturing plan with process sheets and tooling list
                        content: |
                          Develop manufacturing plan per AS9100 Section 8.5.1 production and service provision.
                          Include operation sequence, process sheets with step-by-step instructions, tooling and
                          fixture requirements, inspection points (in-process and final), special process callouts
                          (per NADCAP AC7004 welding, AC7101 NDT, AC7108 chemical processing), and material
                          handling requirements. Reference AS9145 APQP Phase 3 process design deliverables.

          # ── L2: Manufacturing Materials Management ──
          - label: Manufacturing Materials Management
            summary: >-
              Inventory management, procurement coordination, receiving/inspection, and
              repetitive manufacturing material flow — manufacturing floor perspective
            systems:
              - label: Inventory Management for Manufacturing
                content: |
                  Use of forecasting in inventory decisions; order points and order quantities (EOQ,
                  safety stock); JIT inventory philosophy; inventory classification (ABC analysis);
                  WIP management.
              - label: Manufacturing Procurement Coordination
                content: |
                  Manufacturing engineer's role in vendor selection (process capability requirements);
                  quality and certification requirements for purchased materials; offshore procurement
                  considerations for manufacturing; supplier technical qualification.
              - label: Receiving, Inspection & Storage
                content: |
                  Incoming material inspection methods; material identification and traceability; storage
                  requirements (environmental control, shelf life, FIFO); material handling from receiving
                  to point-of-use.
              - label: Repetitive Manufacturing & Line Supply
                content: |
                  Dedicated facilities and fixed routings; line supply methods (kanban, kitting, bulk);
                  labor reporting in repetitive environments; material presentation at workstation;
                  supermarket concepts.

          # ── L2: Manufacturing Process Quality ──
          # ★ Reparented: existing neuron 101 chain lives here as L3
          - label: Manufacturing Process Quality
            summary: >-
              Quality planning, process capability, FMEA, quality programs, and quality cost
              analysis from the manufacturing process engineering perspective
            systems:
              - label: Quality Planning for Manufacturing
                content: |
                  Quality planning hierarchy; quality missions, policies, and plans; strategic quality
                  planning; quality organization and inspection structure; monitoring quality outcomes;
                  quality performance data and audits.
              - label: Process Capability Analysis
                content: |
                  Conceptual and analytical definitions of process capability; Cp, Cpk, Pp, Ppk indices;
                  process capability vs. specifications; gage and measurement system capability (GR&R);
                  process capability studies methodology.
              - label: FMEA, FTA & Quality Tools
                content: |
                  Failure Mode and Effects Analysis (process FMEA); fault tree analysis; Quality Function
                  Deployment (QFD — manufacturing perspective); design review participation; reliability
                  planning; Material Review Board (MRB) process.
              - label: Quality Programs & Standards
                content: |
                  Crosby 14-step program; quality assurance teams; zero defects methodology; quality
                  training programs; quality standards implementation; quality audit preparation and
                  response.
              - label: Quality Cost & Improvement
                content: |
                  Quality cost categories (prevention, appraisal, internal/external failure); strategic
                  quality planning with cost data; baselines for analysis; product and departmental
                  improvement; supplier quality costs; manufacturing focus on cost of quality.
              - label: Composite Fabrication Process Development
                summary: >-
                  Reparented from direct role child. Composite fabrication process validation including
                  cure parameter control and NDI requirements.
                decisions:
                  - label: Program autoclave/ATP machines and validate cure parameters against process spec
                    outputs:
                      - label: Issue composite fabrication traveler with NDI requirements
                        content: |
                          Prepare composite fabrication traveler including material kitting instructions (prepreg
                          out-time tracking), layup sequence per engineering ply table, vacuum bag configuration,
                          autoclave cure cycle parameters per material spec (e.g., Hexcel 8552 or Toray T800),
                          NDI requirements per ASNT SNT-TC-1A (ultrasonic C-scan, thermography), and dimensional
                          inspection requirements. Reference NAS 410 for NDT personnel certification.

          # ── L2: Manufacturing Safety & Hazard Analysis ──
          - label: Manufacturing Safety & Hazard Analysis
            summary: >-
              Engineering perspective on occupational safety — hazard analysis, accident
              prevention, and OSHA compliance for manufacturing processes
            systems:
              - label: Manufacturing Hazard Analysis
                content: |
                  Hazard analysis methods for manufacturing processes; job hazard analysis (JHA); process
                  hazard analysis; identifying hazards in new equipment/process introduction; accident
                  prevention programs; accident investigation methods.
              - label: OSHA Compliance for Manufacturing
                content: |
                  OSHA standards relevant to manufacturing (machine guarding, lockout/tagout, confined
                  space, PPE); Hazard Communication Standard (HazCom/GHS); recordkeeping requirements;
                  workplace inspection preparation.
              - label: Safety Integration in Manufacturing Engineering
                content: |
                  Safety considerations in process planning; designing safe manufacturing processes;
                  ergonomic considerations in workstation design; management policy toward safety; health
                  and safety program fundamentals.

      - label: Test Engineer
        role_key: test_eng
        tasks:
          - label: Structural test planning and execution
            systems:
              - label: Configure test fixtures and data acquisition per test plan
                decisions:
                  - label: Evaluate test results against predicted values and acceptance criteria
                    outputs:
                      - label: Generate test report with results correlation to analysis
                        content: |
                          Prepare structural test report per MIL-STD-1530 ASIP requirements. Include test article
                          description, instrumentation layout (strain gauges, LVDTs, load cells), load application
                          method, test sequence, raw data plots, comparison to FEA predictions (target <10% deviation),
                          and failure mode documentation if applicable. Calculate test-adjusted margins and update
                          analysis models. Submit through test review board.

          - label: Environmental qualification testing
            systems:
              - label: Execute environmental test profiles per MIL-STD-810H / DO-160G
                decisions:
                  - label: Assess pass/fail against acceptance criteria and identify anomalies
                    outputs:
                      - label: Issue qualification test report with compliance matrix
                        content: |
                          Document environmental qualification test results per MIL-STD-810H and/or DO-160G.
                          Include test categories performed (vibration Method 514.8, shock Method 516.8, altitude
                          Method 500.6, temperature Method 501.7/502.7, humidity Method 507.6, EMI per MIL-STD-461G),
                          test profiles with actual vs. specified parameters, functional test results at each
                          condition, and compliance summary matrix. Identify any test anomalies with disposition.

  - label: Contracts & Compliance
    roles:
      - label: Contract Analyst
        role_key: contract_analyst
        tasks:
          - label: Monthly compliance risk review
            systems:
              - label: Query SAP for CLINs near due date and review obligation status
                decisions:
                  - label: Sort by cost times urgency, identify top risks and required actions
                    outputs:
                      - label: Email risk report to PM and contracts lead in specified format
                        content: |
                          Generate monthly CLIN compliance risk report. Query SAP for all active CLINs with
                          delivery dates within 60 days. Calculate risk score = (remaining cost / total CLIN value)
                          × (1 / days remaining). Sort descending. For top 10 risks, document: CLIN number,
                          deliverable description, current status, funding status (fully funded/incrementally funded),
                          LOE vs. deliverable type, and recommended action. Cross-reference with DCMA surveillance
                          findings. Format as Excel with conditional formatting and email to PM within 3 business days.

          - label: Contract modification processing
            systems:
              - label: Review modification requests in contract management system
                decisions:
                  - label: Validate scope alignment with existing terms and FAR compliance
                    outputs:
                      - label: Prepare contract modification package with revised SOW and pricing
                        content: |
                          Process contract modification per FAR 43.103 (bilateral) or FAR 43.201 (unilateral).
                          Document scope change description, delta pricing with basis of estimate, updated CDRL
                          list if applicable, period of performance adjustment, and revised contract value. Ensure
                          DFARS 252.204-7012 (CMMC/cybersecurity) and 252.227-7013 (data rights) clauses flow
                          correctly. Route through legal review and obtain CO signature.

          - label: CDRL tracking and deliverable management
            systems:
              - label: Maintain CDRL tracker with submission dates and government acceptance status
                decisions:
                  - label: Prioritize overdue CDRLs and coordinate with technical leads
                    outputs:
                      - label: Submit CDRL packages through government portal with transmittal letter
                        content: |
                          Manage CDRL submissions per DI-MGMT-80368 Data Item Description format. Track each CDRL
                          by exhibit line item number, DID number, submission frequency, distribution list, and
                          government review period. Prepare transmittal letter referencing contract number, CDRL
                          exhibit, and data item. Submit through designated government portal (e.g., PIEE/WAWF).
                          Track government acceptance within 30-day review period per FAR 52.247-34.

      - label: Export Control Officer
        role_key: export_control
        tasks:
          - label: ITAR/EAR classification and licensing
            systems:
              - label: Screen items against USML and CCL using DECCS classification tool
                decisions:
                  - label: Determine jurisdiction (ITAR/EAR) and required license type
                    outputs:
                      - label: Issue commodity jurisdiction determination or license application
                        content: |
                          Perform commodity jurisdiction determination per 22 CFR 120.3. If ITAR-controlled,
                          identify USML category and determine if Technical Assistance Agreement (TAA), Manufacturing
                          License Agreement (MLA), or DSP-5 export license is required. If EAR-controlled, determine
                          ECCN and applicable license exception (e.g., GOV, TSR, TMP). Document screening results
                          including denied party screening (SAM.gov, BIS Entity List, OFAC SDN). Maintain Technology
                          Control Plan per ITAR 22 CFR 125.

          - label: Deemed export management
            systems:
              - label: Screen foreign national employees against ITAR restricted countries
                decisions:
                  - label: Approve or restrict facility access based on citizenship and program classification
                    outputs:
                      - label: Issue access determination letter with required controls
                        content: |
                          Process deemed export determination per EAR 15 CFR 734.13 and ITAR 22 CFR 120.17.
                          Verify foreign national citizenship against restricted country lists (ITAR 22 CFR 126.1).
                          If access approved, document required Technology Control Plan provisions including
                          information barriers, computer access restrictions, meeting attendance limitations, and
                          facility access controls. Issue determination letter with annual review date.

      - label: FAR/DFARS Specialist
        role_key: far_specialist
        tasks:
          - label: Clause compliance review and flowdown
            systems:
              - label: Parse RFP Section I clauses against FAR/DFARS compliance matrix
                decisions:
                  - label: Identify high-risk clauses and required flowdown to subcontractors
                    outputs:
                      - label: Prepare clause compliance matrix with risk assessment
                        content: |
                          Review RFP Section I for all incorporated FAR/DFARS clauses. Map each clause to internal
                          compliance procedures. Flag high-risk clauses: DFARS 252.225-7001 (Buy American), DFARS
                          252.225-7012 (specialty metals), DFARS 252.204-7012 (CMMC/cybersecurity), FAR 52.222-50
                          (human trafficking), FAR 52.219-9 (small business subcontracting plan). Determine required
                          flowdown per FAR 52.244-6. Prepare compliance matrix with responsible party and evidence requirements.

          - label: Cost Accounting Standards compliance
            systems:
              - label: Review cost accounting practices against CAS 401-420
                decisions:
                  - label: Identify potential CAS violations and corrective actions
                    outputs:
                      - label: Issue CAS compliance assessment with remediation recommendations
                        content: |
                          Conduct CAS compliance review per 48 CFR 9904. Verify consistency of cost accounting
                          practices (CAS 401), allocation of home office expenses (CAS 403), capitalization of
                          assets (CAS 404), allocation of IR&D/B&P (CAS 420). Document any disclosed practices
                          that deviate from published Disclosure Statement. Recommend corrective actions and
                          estimate potential cost impact of any noncompliance. Coordinate with DCAA auditor.

      - label: Quality Auditor
        role_key: quality_auditor
        tasks:
          - label: Internal audit program management
            systems:
              - label: Execute audit schedule per AS9100 Section 9.2 requirements
                decisions:
                  - label: Classify findings as major/minor NCR and determine root cause
                    outputs:
                      - label: Issue audit report with findings and corrective action requests
                        content: |
                          Conduct internal quality audit per AS9100D Section 9.2.2. Prepare audit checklist
                          covering applicable clauses, review objective evidence, interview personnel, and
                          document findings. Classify nonconformities: Major (system breakdown, missing required
                          element) or Minor (isolated instance, incomplete implementation). Issue CARs per 8D
                          methodology with root cause analysis (5-Why, Ishikawa), containment actions, corrective
                          actions, and effectiveness verification date. Track in CAPA system.

          - label: Supplier quality assessment
            systems:
              - label: Review supplier quality data and conduct on-site assessments
                decisions:
                  - label: Approve, conditionally approve, or disqualify suppliers
                    outputs:
                      - label: Issue supplier assessment report with approval status
                        content: |
                          Conduct supplier quality assessment per AS9100 Section 8.4 and AS9120 flow-down
                          requirements. Evaluate quality management system, process capability, on-time delivery
                          performance, escape rate history, and NADCAP certifications (if applicable). Score using
                          Yggdrasil Aero supplier scorecard (QMS: 25%, delivery: 25%, quality: 30%, cost: 20%). Issue
                          approval determination: Approved, Conditionally Approved (with improvement plan), or
                          Disqualified. Maintain in Approved Supplier List.

      - label: Safety Officer
        role_key: safety_officer
        tasks:
          - label: System safety analysis
            systems:
              - label: Perform hazard analysis per MIL-STD-882E using fault tree analysis
                decisions:
                  - label: Classify hazards by severity/probability and determine risk acceptance
                    outputs:
                      - label: Publish system safety assessment report
                        content: |
                          Conduct system safety assessment per MIL-STD-882E. Perform Preliminary Hazard List (PHL),
                          Preliminary Hazard Analysis (PHA), Subsystem Hazard Analysis (SSHA), System Hazard Analysis
                          (SHA), and Operating & Support Hazard Analysis (O&SHA). Classify hazards using risk
                          assessment matrix (Severity I-IV × Probability A-E). Document risk mitigation actions
                          and residual risk acceptance. Maintain Safety Assessment Report (SAR) with hazard tracking
                          log. Present to System Safety Working Group for approval.

          - label: Mishap investigation and reporting
            systems:
              - label: Conduct mishap investigation per company safety procedures
                decisions:
                  - label: Determine causal factors and corrective actions using HFACS framework
                    outputs:
                      - label: Submit mishap report to safety review board and applicable agencies
                        content: |
                          Investigate mishap/incident per MIL-STD-882E Section 4.10. Apply Human Factors Analysis
                          and Classification System (HFACS) to identify organizational influences, unsafe supervision,
                          preconditions, and unsafe acts. Document sequence of events, physical evidence, witness
                          statements, and contributing factors. Prepare mishap report including corrective actions
                          with implementation timeline. Submit to Safety Review Board and applicable agencies (FAA,
                          DoD) per reporting timeframes (24-hour preliminary, 30-day final).

  - label: Manufacturing & Operations
    roles:
      - label: Production Manager
        role_key: prod_mgr
        tasks:
          - label: Production scheduling and workflow management
            systems:
              - label: Manage production schedule in MES with capacity constraints
                decisions:
                  - label: Sequence work orders based on priority, tooling availability, and material readiness
                    outputs:
                      - label: Publish weekly production schedule with shift assignments
                        content: |
                          Generate weekly production schedule including work order sequence, station assignments,
                          shift coverage, tooling allocation, and material pull schedules. Apply Theory of Constraints
                          to identify and manage bottleneck stations. Include overtime authorization requests if
                          needed. Track schedule performance index (SPI) against program milestones. Format per
                          Yggdrasil Aero production planning template and distribute to floor supervisors by Thursday COB.

          - label: Production nonconformance management
            systems:
              - label: Disposition NCRs in quality system per AS9100 Section 8.7
                decisions:
                  - label: Determine disposition (use-as-is, repair, rework, scrap) with engineering concurrence
                    outputs:
                      - label: Process MRB action with cost impact and schedule recovery plan
                        content: |
                          Manage nonconforming product per AS9100 Section 8.7. Document nonconformity description,
                          affected parts/lots, containment actions, and root cause. Convene Material Review Board
                          (MRB) for disposition: use-as-is (with engineering analysis), repair (per approved repair
                          procedure), rework (to drawing requirements), or scrap. Calculate cost impact and schedule
                          recovery plan. Notify customer if contractually required per FAR 52.246-2.

      - label: Quality Manager
        role_key: quality_mgr
        tasks:
          - label: Quality management system maintenance
            systems:
              - label: Maintain QMS documentation per AS9100D requirements
                decisions:
                  - label: Review and approve QMS changes through document control process
                    outputs:
                      - label: Release updated quality manual and procedures
                        content: |
                          Maintain Quality Management System per AS9100D. Manage documented information including
                          quality manual, quality policy, quality objectives, procedures, work instructions, and
                          forms. Process document changes through review/approval workflow per Section 7.5. Conduct
                          management review per Section 9.3 including audit results, customer feedback, process
                          performance, nonconformity trends, and improvement opportunities. Prepare for CB
                          surveillance audits per annual schedule.

          - label: First Article Inspection coordination
            systems:
              - label: Coordinate FAI per AS9102 requirements
                decisions:
                  - label: Verify FAI completeness and approve for production release
                    outputs:
                      - label: Approve and archive FAI package in quality records
                        content: |
                          Coordinate First Article Inspection per AS9102B. Ensure FAI package includes Form 1
                          (Part Number Accountability), Form 2 (Product Accountability — raw material, special
                          process, functional test), and Form 3 (Characteristic Accountability — all drawing
                          dimensions with actual measured values). Verify all characteristics meet drawing
                          requirements. Obtain customer approval if required. Archive in quality records with
                          part number and revision traceability.

      - label: Supply Chain Manager
        role_key: supply_chain_mgr
        tasks:
          - label: Supplier management and procurement
            systems:
              - label: Manage purchase orders and supplier performance in ERP
                decisions:
                  - label: Select suppliers based on quality, cost, delivery, and AS9100 compliance
                    outputs:
                      - label: Issue purchase orders with quality and compliance flowdowns
                        content: |
                          Process procurement per AS9100 Section 8.4 and FAR/DFARS flowdown requirements. Issue
                          purchase orders with applicable quality clauses (right of access, first article requirements,
                          special process certifications), material specifications, DFARS clauses (252.225-7001 Buy
                          American, 252.225-7012 specialty metals if applicable), and delivery requirements. Maintain
                          supplier performance scorecards and conduct periodic supplier reviews.

          - label: Material planning and inventory control
            systems:
              - label: Run MRP in ERP system for material requirements planning
                decisions:
                  - label: Optimize inventory levels balancing carrying cost vs. stockout risk
                    outputs:
                      - label: Generate material requirements plan with lead time analysis
                        content: |
                          Execute MRP run to generate material requirements plan. Include long-lead items with
                          procurement timelines, safety stock calculations, shelf-life management for perishable
                          materials (prepreg, adhesives, sealants), and lot traceability requirements per AS9100
                          Section 8.5.2. Flag items requiring government-furnished material (GFM) coordination.
                          Identify single-source risks and develop mitigation strategies.

      - label: Facilities Manager
        role_key: facilities_mgr
        tasks:
          - label: Facility maintenance and cleanroom management
            systems:
              - label: Monitor environmental controls and calibration schedules
                decisions:
                  - label: Schedule maintenance to minimize production impact
                    outputs:
                      - label: Issue facility maintenance report and compliance certificates
                        content: |
                          Manage facility maintenance per AS9100 Section 7.1.3 infrastructure requirements. Monitor
                          cleanroom classifications per ISO 14644 (particle counts, temperature, humidity). Maintain
                          calibration program per ISO 17025 / ANSI Z540.3. Schedule preventive maintenance during
                          non-production windows. Document ESD control per ANSI/ESD S20.20. Maintain facility
                          security per NISPOM 32 CFR 117 for classified programs.

  - label: Business Development
    roles:
      - label: BD Director
        role_key: bd_director
        tasks:
          - label: Market analysis and opportunity identification
            systems:
              - label: Monitor SAM.gov, agency forecasts, and industry publications
                decisions:
                  - label: Screen opportunities against strategic fit criteria and resource availability
                    outputs:
                      - label: Present opportunity assessment to leadership with go/no-go recommendation
                        content: |
                          Prepare opportunity assessment brief including market analysis, agency budget trends,
                          program background, competitive landscape (incumbent performance, known competitors),
                          Yggdrasil Aero capabilities alignment, estimated win probability (Pwin), required investment
                          (B&P budget), and go/no-go recommendation. Reference FAR Part 15 competitive procedures
                          and applicable NAICS/PSC codes. Present at monthly pipeline review meeting.

          - label: Strategic partnership development
            systems:
              - label: Evaluate potential teaming partners for capability gaps
                decisions:
                  - label: Select teaming approach (prime, sub, JV) based on strategic value
                    outputs:
                      - label: Execute teaming agreement with defined work share and IP protections
                        content: |
                          Develop teaming strategy including capability gap analysis, partner evaluation criteria,
                          work share allocation, cost share framework, and IP/data rights protections. Prepare
                          Teaming Agreement with legal review covering exclusivity terms, work share percentages,
                          termination provisions, and ITAR compliance requirements. Execute NDA prior to any
                          technical discussions. Maintain teaming partner database with past performance data.

      - label: Proposal Manager
        role_key: proposal_mgr
        tasks:
          - label: Proposal development and production
            systems:
              - label: Manage proposal schedule in Shipley-compliant proposal management tool
                decisions:
                  - label: Conduct color team reviews (Pink, Red, Gold) per Shipley process
                    outputs:
                      - label: Submit compliant proposal package per RFP Section L/M
                        content: |
                          Manage proposal development per Shipley methodology. Parse RFP Sections L (Instructions)
                          and M (Evaluation Criteria). Develop proposal outline, compliance matrix, and win theme
                          document. Coordinate volume leads (Technical, Management, Past Performance, Cost/Price).
                          Conduct color team reviews: Pink Team (storyboard/outline review), Red Team (draft
                          review for compliance and persuasiveness), Gold Team (final review by leadership).
                          Produce final proposal with executive summary, all required volumes, certifications,
                          and representations. Submit per RFP instructions (grants.gov, email, hardcopy).

          - label: Past performance documentation
            systems:
              - label: Compile past performance references from CPARS and internal records
                decisions:
                  - label: Select most relevant past performance examples per evaluation criteria
                    outputs:
                      - label: Prepare past performance volume with CPARS references
                        content: |
                          Develop past performance volume highlighting 3-5 most relevant contract references.
                          For each reference, document: contract number, agency, period of performance, contract
                          value, scope description emphasizing relevance to current opportunity, key personnel
                          involved, performance metrics (OTD, quality, cost control), and customer reference
                          contact information. Include CPARS ratings summary. Address any adverse past performance
                          with corrective action narrative.

      - label: Capture Manager
        role_key: capture_mgr
        tasks:
          - label: Capture campaign execution
            systems:
              - label: Track capture activities and customer engagement per capture plan
                decisions:
                  - label: Adjust strategy based on customer feedback and competitive intelligence
                    outputs:
                      - label: Update capture status brief with customer interaction log
                        content: |
                          Execute capture campaign per approved capture plan. Track customer engagement activities
                          (industry days, pre-solicitation conferences, one-on-one meetings), competitive intelligence
                          (Freedom of Information Act responses, incumbent contract data, published past performance),
                          and solution refinement activities. Maintain customer interaction log per procurement
                          integrity rules (41 USC 2102). Update win probability assessment monthly. Present status
                          at gate reviews (Gate 1: Qualify, Gate 2: Capture Strategy, Gate 3: Proposal Ready).

  - label: Administrative & Support
    roles:
      - label: HR Generalist
        role_key: hr_generalist
        tasks:
          - label: Personnel security and onboarding
            systems:
              - label: Process security clearance applications through DISS/eQIP
                decisions:
                  - label: Verify clearance eligibility and program access requirements
                    outputs:
                      - label: Issue onboarding package with security briefing acknowledgments
                        content: |
                          Process new hire onboarding per NISPOM 32 CFR 117 requirements. Initiate security clearance
                          investigation through DISS (Defense Information System for Security). Conduct initial
                          security briefing covering classified information handling, reporting requirements, foreign
                          travel notification, and social media guidelines. Issue badge with appropriate access levels.
                          Ensure completion of required training: cybersecurity awareness (annual), insider threat
                          (annual), ITAR awareness, and ethics/code of conduct.

          - label: Workforce planning and compliance
            systems:
              - label: Track EEO/AA compliance and affirmative action plan metrics
                decisions:
                  - label: Identify workforce gaps and develop targeted recruiting strategies
                    outputs:
                      - label: Submit annual EEO-1 report and affirmative action plan update
                        content: |
                          Maintain EEO/AA compliance per Executive Order 11246 and OFCCP regulations. Compile
                          workforce demographics for annual EEO-1 Component 1 filing. Update Affirmative Action
                          Plan (AAP) with utilization analysis, placement goals, and action-oriented programs.
                          Track VETS-4212 reporting for covered veterans. Ensure compliance with FAR 52.222-26
                          (Equal Opportunity) and 52.222-35 (Veterans Employment).

      - label: IT Support Specialist
        role_key: it_support
        tasks:
          - label: NIST 800-171 compliance and CUI handling
            systems:
              - label: Configure systems per NIST 800-171 security controls
                decisions:
                  - label: Assess compliance gaps and implement required security controls
                    outputs:
                      - label: Generate System Security Plan and POA&M for CMMC assessment
                        content: |
                          Maintain System Security Plan (SSP) per NIST SP 800-171 Rev 2 (110 controls across 14
                          families). Configure CUI handling procedures: marking (per 32 CFR 2002), storage (encrypted
                          at rest AES-256), transmission (TLS 1.2+/VPN), and destruction (NIST SP 800-88 media
                          sanitization). Develop Plan of Action & Milestones (POA&M) for any control gaps. Prepare
                          for CMMC Level 2 assessment by C3PAO. Maintain evidence artifacts for each control family.

          - label: IT infrastructure and endpoint management
            systems:
              - label: Manage endpoints and patching per STIG requirements
                decisions:
                  - label: Prioritize patches based on CVSS scores and mission impact
                    outputs:
                      - label: Generate monthly patch compliance report and STIG checklist
                        content: |
                          Manage IT infrastructure per DISA STIG requirements. Apply security patches within
                          compliance timelines (Critical: 7 days, High: 30 days, Medium: 90 days per IAVA/STIG).
                          Run ACAS/Nessus vulnerability scans monthly. Generate STIG compliance checklists for
                          Windows, Linux, and network device configurations. Report patch compliance metrics
                          to ISSO. Maintain hardware/software inventory in CMDB.

      - label: Procurement Specialist
        role_key: procurement
        tasks:
          - label: Purchase requisition processing
            systems:
              - label: Process purchase requisitions through ERP approval workflow
                decisions:
                  - label: Validate funding, approvals, and sole-source justifications
                    outputs:
                      - label: Issue purchase order with applicable terms and conditions
                        content: |
                          Process purchase requisitions per company procurement procedures and FAR/DFARS
                          requirements. Verify funding availability, approval authority levels, and sole-source
                          justification if applicable (FAR 6.302). Apply standard terms and conditions including
                          quality clauses, delivery terms (FOB point), inspection/acceptance criteria, and
                          applicable government flowdown clauses. Obtain competitive quotes per threshold
                          requirements ($3K-$150K: 3 quotes, >$150K: formal RFP).

      - label: Payroll Specialist
        role_key: payroll
        tasks:
          - label: Labor charging and timekeeping compliance
            systems:
              - label: Administer timekeeping system per DCAA-compliant procedures
                decisions:
                  - label: Review labor charges for allowability and proper allocation
                    outputs:
                      - label: Process payroll with verified labor distribution
                        content: |
                          Administer timekeeping per DCAA-compliant labor charging procedures. Ensure daily
                          recording of labor hours by charge number (direct contracts, indirect pools, PTO).
                          Verify floor checks and supervisor approvals. Process labor cost transfers with
                          documented justification (no after-the-fact transfers without contracting officer
                          approval). Generate labor distribution report for cost accounting. Comply with
                          FAR 31.205-6 (compensation) and CAS 418 (direct/indirect cost allocation).

  - label: Finance
    roles:
      - label: Financial Analyst
        role_key: financial_analyst
        tasks:
          - label: Program financial analysis and EVM reporting
            systems:
              - label: Generate EVM metrics from cost/schedule data in project controls system
                decisions:
                  - label: Analyze cost and schedule variances, project estimate at completion
                    outputs:
                      - label: Publish monthly EVM report (CPR/IPMR Format 1-5)
                        content: |
                          Prepare Integrated Program Management Report (IPMR) per DI-MGMT-81861A. Generate
                          Format 1 (WBS), Format 2 (Organizational), Format 3 (Baseline), Format 4 (Staffing),
                          and Format 5 (Narrative). Calculate key metrics: CPI, SPI, TCPI, EAC, VAC. Analyze
                          cost variance (CV = BCWP - ACWP) and schedule variance (SV = BCWP - BCWS). Identify
                          programs with CPI < 0.95 or SPI < 0.90 for management attention. Prepare variance
                          analysis narrative explaining significant variances (>10%) with corrective action plans.

          - label: Indirect rate development and monitoring
            systems:
              - label: Calculate actual indirect rates against provisional billing rates
                decisions:
                  - label: Recommend rate adjustments based on actual vs. planned spending
                    outputs:
                      - label: Issue indirect rate analysis report with forward pricing recommendations
                        content: |
                          Monitor indirect rates (fringe, overhead, G&A, material handling) against provisional
                          billing rates approved by DCMA. Calculate actual rates monthly and project year-end
                          rates. Prepare forward pricing rate proposal per FAR 42.1701 and DFARS 242.703-1.
                          Document rate base allocation methodology per Disclosure Statement. Flag significant
                          rate deviations (>5%) for management action. Support annual incurred cost audit.

      - label: Cost Accountant
        role_key: cost_accountant
        tasks:
          - label: Cost pool management and allocation
            systems:
              - label: Maintain cost pools and allocation bases in accounting system
                decisions:
                  - label: Ensure consistent allocation methodology per CAS and Disclosure Statement
                    outputs:
                      - label: Generate cost pool summary with allocation calculations
                        content: |
                          Maintain cost pool structure per approved Disclosure Statement and CAS requirements.
                          Manage direct cost pools (by contract/WBS), indirect pools (engineering overhead,
                          manufacturing overhead, material handling, G&A), and service center allocations.
                          Verify allocation bases (direct labor dollars, total cost input, material costs) are
                          consistently applied per CAS 418. Prepare monthly cost pool summary with allocation
                          calculations. Support DCAA audits with documentation trails.

          - label: Contract cost-to-complete analysis
            systems:
              - label: Compile actual costs and commitments from accounting system
                decisions:
                  - label: Develop estimate to complete based on technical progress and burn rate
                    outputs:
                      - label: Submit cost-to-complete report with risk-adjusted projections
                        content: |
                          Prepare contract cost-to-complete analysis including actual costs to date (by cost
                          element), open commitments, estimate to complete (ETC) by WBS element, and estimate
                          at completion (EAC). Apply risk-adjusted projection methodology considering technical
                          progress, burn rate trends, and identified risks. Compare EAC to contract ceiling and
                          funded value. Flag contracts approaching 85% of ceiling for management attention.
                          Report per FAR 52.232-20 (Limitation of Cost) and FAR 52.232-22 (Limitation of Funds).

  - label: Program Management
    roles:
      - label: Program Manager
        role_key: program_mgr
        tasks:
          - label: Integrated program planning and execution
            systems:
              - label: Maintain IMS in Microsoft Project/Primavera per DI-MGMT-81650
                decisions:
                  - label: Analyze critical path and authorize schedule recovery actions
                    outputs:
                      - label: Publish monthly program status report with EVM dashboard
                        content: |
                          Manage integrated master schedule per DI-MGMT-81650 and NDIA PASEG guidelines. Maintain
                          resource-loaded schedule with critical path analysis. Publish monthly program status
                          report including: program overview, technical progress by WBS, schedule status (milestone
                          tracker, critical path analysis), cost status (EVM metrics, variance narratives), risk
                          register update (per MIL-STD-882E risk matrix), and action item tracker. Present at
                          monthly Program Management Review (PMR) with customer.

          - label: Risk and opportunity management
            systems:
              - label: Maintain risk register with probability, impact, and mitigation plans
                decisions:
                  - label: Accept, mitigate, transfer, or avoid risks based on program tolerance
                    outputs:
                      - label: Update risk register and present at risk review board
                        content: |
                          Manage program risk per MIL-STD-882E and PMI risk management framework. Maintain risk
                          register with: risk ID, description, root cause, probability (1-5), impact (1-5),
                          risk score (P×I), risk response strategy (accept/mitigate/transfer/avoid), mitigation
                          actions with owners and due dates, and residual risk assessment. Identify opportunities
                          (positive risks) for schedule acceleration or cost savings. Present top 10 risks at
                          monthly risk board. Maintain risk burn-down chart.

          - label: Contract deliverable management
            systems:
              - label: Track CDRLs, milestones, and contractual obligations in program tracker
                decisions:
                  - label: Prioritize deliverables based on contractual deadlines and customer feedback
                    outputs:
                      - label: Submit contract deliverables with quality review and customer coordination
                        content: |
                          Manage contract deliverables per CDRL exhibit and Data Item Descriptions. Coordinate
                          technical content development with IPT leads. Process through internal quality review
                          prior to submission. Track government review and acceptance per contract terms. Manage
                          customer relationship including status meetings, action item resolution, and performance
                          feedback. Ensure CPARS ratings are addressed proactively through regular performance discussions.
